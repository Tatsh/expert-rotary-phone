concurrency:
  cancel-in-progress: true
  group: build-${{ github.ref }}
env:
  BUILD_CONFIG: 'Release'
  IOS_CMAKE_REF: '21598aa550701d20654c032328f7e8710a14099b'
jobs:
  xcode:
    permissions:
      attestations: write
      contents: write
      id-token: write
    runs-on: macos-14
    env:
      IOS_ARCHS: 'arm64'
      DEPLOYMENT_TARGET: '12.0'
      # POPNRHYTHMIN_BINARY: ${{ vars.POPNRHYTHMIN_BINARY }}
      # RESOURCES_DIR: ${{ vars.RESOURCES_DIR }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Toolchain versions
        run: |
          xcodebuild -version
          sw_vers
      - name: Fetch ios-cmake toolchain
        run: git clone --depth 1 --branch "$IOS_CMAKE_REF" https://github.com/leetal/ios-cmake.git .ios-cmake
      - name: Configure
        run: |
          CMAKE_ARGS=(
            -B build
            -G Xcode
            -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/.ios-cmake/ios.toolchain.cmake"
            -DDEPLOYMENT_TARGET="$DEPLOYMENT_TARGET"
            -DENABLE_BITCODE=NO
            -DIOS_ARCHS="$IOS_ARCHS"
            -DPLATFORM=OS64
          )
          [ -n "$POPNRHYTHMIN_BINARY" ] && CMAKE_ARGS+=( -DPOPNRHYTHMIN_BINARY="$POPNRHYTHMIN_BINARY" )
          [ -n "$RESOURCES_DIR" ] && CMAKE_ARGS+=( -DRESOURCES_DIR="$RESOURCES_DIR" )
          cmake "${CMAKE_ARGS[@]}"
      - name: Build
        run: |
          cmake --build build --config "$BUILD_CONFIG" -- \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
      - name: Ad-hoc sign + package .ipa
        run: |
          APP="$(find build -type d -name 'PopnRhythmin.app' -print -quit)"
          test -n "$APP" || { echo "PopnRhythmin.app not found under build/"; exit 1; }
          echo "Built app: $APP"
          codesign --force --sign - --timestamp=none "$APP"
          codesign --verify --verbose=2 "$APP"
          rm -rf Payload PopnRhythmin-adhoc.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          /usr/bin/zip -qry PopnRhythmin-adhoc.ipa Payload
          echo "Packaged: PopnRhythmin-adhoc.ipa"
      - name: Upload .ipa
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: PopnRhythmin-adhoc-ipa
          path: PopnRhythmin-adhoc.ipa
          if-no-files-found: error
name: build
'on':
  push:
    branches: ['master']
    tags:
      - 'v*.*.*'
  pull_request:
    branches: ['master']
